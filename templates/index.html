<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant AI Chat</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .chat-container {
    background: rgba(0,0,0,0.4);
    width: 400px;
    max-width: 90%;
    border-radius: 15px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 500px;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
  }
  .message {
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
  }
  .user { background: rgba(255,255,255,0.3); align-self: flex-end; }
  .ai { background: rgba(255,255,255,0.1); align-self: flex-start; }
  .input-container {
    display: flex;
  }
  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
  }
  button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #2575fc;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="chat-container">
  <div class="messages" id="messages"></div>
  <div class="input-container">
    <input type="text" id="messageInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const msg = input.value.trim();
  if (!msg) return;

  const messagesDiv = document.getElementById("messages");

  // Add user message
  const userDiv = document.createElement("div");
  userDiv.className = "message user";
  userDiv.textContent = msg;
  messagesDiv.appendChild(userDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  input.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    const aiDiv = document.createElement("div");
    aiDiv.className = "message ai";
    aiDiv.textContent = data.content;
    messagesDiv.appendChild(aiDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  } catch (err) {
    const errDiv = document.createElement("div");
    errDiv.className = "message ai";
    errDiv.textContent = "AI Error: " + err;
    messagesDiv.appendChild(errDiv);
  }
}
</script>
</body>
</html>
