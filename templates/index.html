<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kimi Chat</title>
<style>
    /* Page layout */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    #chatContainer {
        width: 400px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* Chat window */
    #chatWindow {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #e6f0ff;
    }

    /* Messages */
    .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        word-wrap: break-word;
    }
    .message.user {
        background: #007bff;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 0;
    }
    .message.ai {
        background: #f0f0f0;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 0;
    }

    /* Kimi icon */
    .kimi-icon {
        width: 24px;
        height: 24px;
        background: url('https://i.imgur.com/6QzXbZK.png') no-repeat center;
        background-size: cover;
        flex-shrink: 0;
        border-radius: 50%;
    }

    /* Input area */
    #inputArea {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background: #fff;
    }
    #userMessage {
        flex: 1;
        padding: 10px 14px;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
    }
    #sendBtn {
        margin-left: 10px;
        padding: 10px 20px;
        border-radius: 20px;
        border: none;
        background: #007bff;
        color: #fff;
        cursor: pointer;
        transition: 0.2s;
    }
    #sendBtn:hover {
        background: #0056b3;
    }
</style>
</head>
<body>
<div id="chatContainer">
    <div id="chatWindow"></div>
    <div id="inputArea">
        <input type="text" id="userMessage" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
const sendBtn = document.getElementById("sendBtn");
const chatWindow = document.getElementById("chatWindow");
const userMessageInput = document.getElementById("userMessage");

// Function to add a message bubble
function addMessage(content, type) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", type);

    const icon = document.createElement("div");
    icon.classList.add("kimi-icon");

    const text = document.createElement("div");
    text.innerHTML = content;

    if (type === "user") {
        msgDiv.appendChild(text);
        msgDiv.appendChild(icon);
    } else {
        msgDiv.appendChild(icon);
        msgDiv.appendChild(text);
    }

    chatWindow.appendChild(msgDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

async function sendMessage() {
    const message = userMessageInput.value.trim();
    if (!message) return;

    addMessage(`You: ${message}`, "user");
    userMessageInput.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });
        const data = await response.json();
        addMessage(`AI: ${data.content}`, "ai");
    } catch (err) {
        console.error("Error:", err);
    }
}

sendBtn.addEventListener("click", sendMessage);
userMessageInput.addEventListener("keyup", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
